<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Member Registration | 법무법인 하이로</title>

    <!-- 파비콘 설정 -->
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 공통 CSS 연결 -->
    <link rel="stylesheet" href="/css/main.css">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom right, #fdfdfd, #f4eee0);
            margin: 0;
        }

        .signup-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .signup-card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 60px 50px;
            border: 1px solid var(--border-color);
            box-shadow: 0 40px 80px rgba(0,0,0,0.06);
            text-align: center;
        }

        .signup-header {
            margin-bottom: 45px;
        }

        .signup-header img {
            height: 60px;
            margin-bottom: 20px;
        }

        .signup-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            letter-spacing: 2px;
            color: var(--text-primary);
            margin: 0;
            text-transform: uppercase;
        }

        .signup-header p {
            font-size: 11px;
            color: var(--gold-primary);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1px solid var(--border-color);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
            background: transparent;
            border-radius: 0;
        }

        .form-group input:focus, .form-group select:focus {
            border-bottom-color: var(--gold-primary);
        }

        .signup-btn {
            width: 100%;
            background: #1a1a1a;
            color: var(--white);
            border: 1px solid var(--gold-primary);
            padding: 18px;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .signup-btn:hover {
            background: var(--gold-primary);
            color: #1a1a1a;
        }

        .footer-link {
            display: block;
            margin-top: 30px;
            font-size: 11px;
            color: #bbb;
            text-decoration: none;
            transition: 0.3s;
        }

        .footer-link:hover {
            color: var(--gold-primary);
        }

        footer {
            background: transparent;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding: 40px 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="signup-card">
            <div class="signup-header">
                <img src="logo.png" alt="High & Law">
                <h1>High & Law</h1>
                <p>Member Registration</p>
            </div>

            <form id="regForm">
                <div class="form-group">
                    <label>Administrator ID</label>
                    <input type="text" id="loginId" placeholder="사용할 아이디를 입력하세요" required spellcheck="false">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="성함을 입력하세요" required spellcheck="false">
                </div>

                <div class="form-group">
                    <label>Position</label>
                    <select id="position" required>
                        <option value="" disabled selected>직책을 선택하세요</option>
                        <option value="대표변호사">대표변호사</option>
                        <option value="파트너변호사">파트너변호사</option>
                        <option value="어쏘변호사">어쏘변호사</option>
                        <option value="실장/팀장">실장/팀장</option>
                        <option value="직원">행정/직원</option>
                    </select>
                </div>

                <button type="submit" class="signup-btn">Request Access</button>
            </form>

            <a href="/login.html" class="footer-link">Already have an account? Login</a>
            <a href="/" class="footer-link" style="margin-top: 10px; opacity: 0.6;">← Return to Home</a>
        </div>
    </div>

    <footer>
        <div class="footer-info" style="font-size: 10px; opacity: 0.5;">
            &copy; 2026 HIGH & LAW FIRM. Internal Management System.<br>
            All submitted information is protected by attorney-client privilege.
        </div>
    </footer>

    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const payload = {
                loginId: document.getElementById('loginId').value,
                password: document.getElementById('password').value,
                name: document.getElementById('name').value,
                position: document.getElementById('position').value
            };

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                const message = await res.text();
                alert(message);

                if(res.ok) {
                    location.href = '/login.html';
                }
            } catch (err) {
                alert('서버와 통신하는 중 오류가 발생했습니다.');
            }
        };
    </script>
</body>
</html>
