<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | 법무법인 하이로</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #111; }
        body { margin: 0; padding: 0; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; background: #000; overflow: hidden; }
        
        .bg-slider { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; }
        .bg-item { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; opacity: 0; transition: opacity 2s; }
        .bg-item.active { opacity: 1; }
        .bg-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 2; }

        .signup-card { 
            position: relative; z-index: 10; background: rgba(255,255,255,0.98); 
            width: 100%; max-width: 440px; padding: 60px 50px; text-align: center; 
            border-top: 4px solid var(--gold); box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .logo { width: 100%; height: auto; margin-bottom: 40px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #ddd; font-size: 15px; outline: none; background: transparent; }
        input:focus, select:focus { border-bottom-color: var(--gold); }
        .signup-btn { width: 100%; background: var(--dark); color: white; border: none; padding: 18px; font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .signup-btn:hover { background: var(--gold); }
        .footer-link { margin-top: 30px; display: block; font-size: 11px; color: #aaa; text-decoration: none; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="bg-slider" id="bg-slider"></div>
    <div class="bg-overlay"></div>

    <div class="signup-card">
        <img src="/logo.png" alt="High & Law" class="logo">
        <form id="regForm">
            <div class="form-group"><label>Identity ID</label><input type="text" id="loginId" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
            <div class="form-group"><label>Full Name</label><input type="text" id="name" required></div>
            <div class="form-group">
                <label>Position</label>
                <select id="position" required>
                    <option value="" disabled selected>Select Position</option>
                    <option value="대표변호사">대표변호사</option>
                    <option value="변호사">변호사</option>
                    <option value="직원">직원</option>
                </select>
            </div>
            <button type="submit" class="signup-btn">Request Access</button>
        </form>
        <a href="/login.html" class="footer-link">Back to Login</a>
    </div>

    <script>
        async function fetchBg() {
            try {
                const res = await fetch('/api/public/hero');
                const data = await res.json();
                const slider = document.getElementById('bg-slider');
                if (data.length > 0) {
                    slider.innerHTML = data.map((m, idx) => {
                        if (m.mimetype.startsWith('image')) return `<img src="/uploads/${m.filename}" class="bg-item ${idx === 0 ? 'active' : ''}">`;
                        else return `<video src="/uploads/${m.filename}" class="bg-item ${idx === 0 ? 'active' : ''}" autoplay muted loop></video>`;
                    }).join('');
                    let current = 0;
                    const items = document.querySelectorAll('.bg-item');
                    setInterval(() => {
                        items[current].classList.remove('active');
                        current = (current + 1) % items.length;
                        items[current].classList.add('active');
                    }, 6000);
                }
            } catch (e) {}
        }
        fetchBg();

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                loginId: document.getElementById('loginId').value,
                password: document.getElementById('password').value,
                name: document.getElementById('name').value,
                position: document.getElementById('position').value
            };
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            alert(await res.text());
            if(res.ok) location.href = '/login.html';
        };
    </script>
</body>
</html>
