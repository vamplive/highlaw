<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Registration | 법무법인 하이로</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #111; }
        body { margin: 0; background: #fdfdfd; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .signup-card { background: white; width: 100%; max-width: 440px; padding: 60px 50px; border: 1px solid #eee; box-shadow: 0 30px 60px rgba(0,0,0,0.05); text-align: center; position: relative; }
        .signup-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--gold); }
        .logo { width: 100%; height: auto; margin-bottom: 40px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #ddd; font-size: 15px; outline: none; background: transparent; transition: 0.3s; }
        input:focus, select:focus { border-bottom-color: var(--gold); }
        .signup-btn { width: 100%; background: var(--dark); color: white; border: none; padding: 18px; font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .signup-btn:hover { background: var(--gold); }
        .footer-link { margin-top: 30px; display: block; font-size: 11px; color: #aaa; text-decoration: none; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="signup-card">
        <img src="/logo.png" alt="High & Law" class="logo">
        <p style="font-family:'Playfair Display'; font-size:11px; color:var(--gold); letter-spacing:4px; margin-bottom:40px;">MEMBER REGISTRATION</p>
        <form id="regForm">
            <div class="form-group"><label>Identity ID</label><input type="text" id="loginId" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
            <div class="form-group"><label>Full Name</label><input type="text" id="name" required></div>
            <div class="form-group">
                <label>Official Position</label>
                <select id="position" required>
                    <option value="" disabled selected>직책을 선택하십시오</option>
                    <option value="대표변호사">대표변호사</option>
                    <option value="변호사">변호사</option>
                    <option value="직원">직원</option>
                </select>
            </div>
            <button type="submit" class="signup-btn">Request Access</button>
        </form>
        <a href="/login.html" class="footer-link">Back to Login</a>
    </div>
    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = { loginId: document.getElementById('loginId').value, password: document.getElementById('password').value, name: document.getElementById('name').value, position: document.getElementById('position').value };
            const res = await fetch('/api/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert(await res.text());
            if(res.ok) location.href = '/login.html';
        };
    </script>
</body>
</html>
