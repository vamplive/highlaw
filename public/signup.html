<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Registration | 법무법인 하이로</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background: linear-gradient(to bottom right, #fdfdfd, #f4eee0); margin: 0; }
        .signup-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .signup-card { background: var(--white); width: 100%; max-width: 450px; padding: 60px 50px; border: 1px solid var(--border-color); box-shadow: 0 40px 80px rgba(0,0,0,0.06); text-align: center; }
        .signup-logo { max-height: 60px; margin: 0 auto 15px; display: block; }
        .signup-header p { font-size: 11px; color: var(--gold-primary); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
        .form-group { margin-bottom: 25px; text-align: left; }
        .form-group label { display: block; font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid var(--border-color); font-size: 15px; outline: none; background: transparent; }
        .signup-btn { width: 100%; background: #1a1a1a; color: var(--white); border: 1px solid var(--gold-primary); padding: 18px; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <img src="/logo.png" alt="High & Law" class="signup-logo">
            <div class="signup-header"><p>Member Registration</p></div>
            <form id="regForm">
                <div class="form-group"><label>ID</label><input type="text" id="loginId" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
                <div class="form-group"><label>Full Name</label><input type="text" id="name" required></div>
                <div class="form-group"><label>Position</label>
                    <select id="position" required>
                        <option value="변호사">변호사</option>
                        <option value="실장/팀장">실장/팀장</option>
                        <option value="직원">직원</option>
                    </select>
                </div>
                <button type="submit" class="signup-btn">Request Access</button>
            </form>
            <a href="/login.html" style="display:block; margin-top:30px; font-size:11px; color:#bbb; text-decoration:none;">Already have an account? Login</a>
        </div>
    </div>
    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = { loginId: document.getElementById('loginId').value, password: document.getElementById('password').value, name: document.getElementById('name').value, position: document.getElementById('position').value };
            const res = await fetch('/api/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert(await res.text());
            if(res.ok) location.href = '/login.html';
        };
    </script>
</body>
</html>
