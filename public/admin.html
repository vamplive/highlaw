<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HighLaw | 관리자 센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="app" class="flex min-h-screen">
        <!-- 사이드바 -->
        <div class="w-64 bg-slate-900 text-white p-6 shadow-xl">
            <h1 class="text-xl font-bold text-amber-500 tracking-widest mb-10">HIGH & LAW ADMIN</h1>
            <nav class="space-y-6">
                <button @click="tab='inquiry'" :class="tab==='inquiry'?'text-amber-500 font-bold':''" class="block w-full text-left">상담 신청 내역</button>
                <button @click="tab='news'" :class="tab==='news'?'text-amber-500 font-bold':''" class="block w-full text-left">뉴스/사례 관리</button>
                <button @click="tab='recruit'" :class="tab==='recruit'?'text-amber-500 font-bold':''" class="block w-full text-left">채용 공고 관리</button>
                <a href="/" class="block pt-10 text-xs opacity-50">홈페이지 가기</a>
            </nav>
        </div>

        <!-- 메인 콘텐츠 -->
        <main class="flex-1 p-10">
            <!-- 1. 상담 신청 내역 -->
            <div v-if="tab === 'inquiry'">
                <h2 class="text-2xl font-bold mb-6">상담 신청 현황</h2>
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="p-4">날짜</th><th class="p-4">신청자</th><th class="p-4">사건일</th><th class="p-4">내용 요약</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y">
                            <tr v-for="item in inquiries" :key="item.id">
                                <td class="p-4">{{ item.created_at }}</td>
                                <td class="p-4 font-bold">{{ item.name }}</td>
                                <td class="p-4">{{ item.date_of_incident }}</td>
                                <td class="p-4">{{ item.summary }}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 2. 뉴스 등록 -->
            <div v-if="tab === 'news'">
                <h2 class="text-2xl font-bold mb-6">뉴스 및 성공사례 등록</h2>
                <div class="bg-white p-8 rounded-lg shadow max-w-2xl">
                    <div class="space-y-4">
                        <select v-model="newsForm.category" class="w-full border p-2 rounded">
                            <option value="H&L News">H&L News</option>
                            <option value="Leading Cases">Leading Cases</option>
                        </select>
                        <input v-model="newsForm.title" type="text" placeholder="제목" class="w-full border p-2 rounded">
                        <textarea v-model="newsForm.content" placeholder="내용 요약" class="w-full border p-2 rounded h-32"></textarea>
                        <button @click="saveNews" class="w-full bg-slate-800 text-white py-3 rounded hover:bg-amber-600 transition">등록하기</button>
                    </div>
                </div>
            </div>

            <!-- 3. 채용 관리 -->
            <div v-if="tab === 'recruit'">
                <h2 class="text-2xl font-bold mb-6">채용 상태 스위치</h2>
                <div class="grid grid-cols-1 gap-4 max-w-md">
                    <div v-for="role in roles" :key="role.id" class="bg-white p-4 rounded shadow flex justify-between items-center">
                        <span class="font-bold">{{ role.label }}</span>
                        <select v-model="role.status" @change="updateRecruit(role.id, role.status)" class="border p-1 rounded">
                            <option value="status-open">모집 중</option>
                            <option value="status-closed">모집 마감</option>
                        </select>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    tab: 'inquiry',
                    inquiries: [],
                    newsForm: { category: 'H&L News', title: '', content: '', date: new Date().toISOString().slice(0,10) },
                    roles: [
                        { id: 'new-lawyer', label: '신규 변호사', status: '' },
                        { id: 'exp-lawyer', label: '경력 변호사', status: '' },
                        { id: 'mil-lawyer', label: '법무관', status: '' },
                        { id: 'staff', label: '전문 직원', status: '' }
                    ]
                }
            },
            methods: {
                async fetchInquiries() {
                    const res = await fetch('/api/admin/inquiries');
                    if(res.ok) this.inquiries = await res.json();
                },
                async fetchRecruitStatus() {
                    const res = await fetch('/api/public/recruit');
                    const data = await res.json();
                    data.forEach(d => {
                        const role = this.roles.find(r => r.id === d.role_id);
                        if(role) role.status = d.status;
                    });
                },
                async saveNews() {
                    const res = await fetch('/api/news', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(this.newsForm)
                    });
                    if(res.ok) {
                        alert('뉴스 등록 완료');
                        this.newsForm.title = ''; this.newsForm.content = '';
                    }
                },

async updateRecruit(id, status) {
    try {
        const res = await fetch('/api/recruit/status', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id, status })
        });
        if(res.ok) {
            alert('채용 상태가 업데이트되었습니다.');
            // (선택사항) 수정한 내용을 즉시 확인하고 싶다면 
            // 실제 페이지 highlaw.co.kr/recruit.html 로 이동해서 확인하시면 됩니다.
        }
    } catch (error) {
        alert('상태 업데이트에 실패했습니다.');
    }
}

            mounted() {
                this.fetchInquiries();
                this.fetchRecruitStatus();
                setInterval(this.fetchInquiries, 10000); // 10초마다 상담 내역 갱신
            }
        }).mount('#app')
    </script>
</body>
</html>
