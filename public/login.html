<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | 법무법인 하이로</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">

    <style>
        :root { --gold-primary: #c5a059; --bg-dark: #111111; --text-gray: #888888; }
        body {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #000;
        }

        /* 동적 배경 슬라이더 스타일 */
        #bg-slider { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .bg-item { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 2s ease-in-out; }
        .bg-item.active { opacity: 1; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }

        .login-wrapper { width: 100%; max-width: 440px; padding: 20px; z-index: 10; animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .login-card { background: rgba(255, 255, 255, 0.95); padding: 60px 50px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3); text-align: center; position: relative; }
        .login-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--gold-primary); }
        .login-logo { width: 100%; height: auto; margin-bottom: 40px; display: block; }
        .login-header p { font-family: 'Playfair Display', serif; font-size: 11px; color: var(--gold-primary); font-weight: 700; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 50px; }
        .input-group { margin-bottom: 30px; text-align: left; }
        .input-group label { display: block; font-size: 10px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
        .input-group input { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #ddd; font-size: 16px; outline: none; background: transparent; transition: 0.3s; color: var(--bg-dark); }
        .input-group input:focus { border-bottom-color: var(--gold-primary); }
        .login-btn { width: 100%; background: var(--bg-dark); color: #fff; border: 1px solid var(--bg-dark); padding: 18px; font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: 0.4s; margin-top: 20px; }
        .login-btn:hover { background: var(--gold-primary); border-color: var(--gold-primary); transform: translateY(-2px); }
        .footer-links { margin-top: 40px; display: flex; justify-content: center; gap: 20px; }
        .footer-links a { font-size: 11px; color: var(--text-gray); text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="bg-slider"></div>
    <div class="bg-overlay"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <img src="/logo.png" alt="High & Law" class="login-logo">
            <div class="login-header"><p>Internal Management System</p></div>
            <div class="input-group">
                <label>Identity ID</label>
                <input type="text" id="adminId" placeholder="아이디를 입력하십시오">
            </div>
            <div class="input-group">
                <label>Secure Password</label>
                <input type="password" id="adminPw" placeholder="비밀번호를 입력하십시오">
            </div>
            <button onclick="login()" class="login-btn">Secure Login</button>
            <div class="footer-links">
                <a href="/">Homepage</a>
                <span style="color:#eee">|</span>
                <a href="/signup.html">Register</a>
            </div>
        </div>
    </div>

    <script>
        async function loadBackground() {
            try {
                const res = await fetch('/api/public/hero');
                const data = await res.json();
                const slider = document.getElementById('bg-slider');
                if (data.length > 0) {
                    slider.innerHTML = data.map((m, idx) => {
                        if (m.mimetype.startsWith('image')) return `<img src="/uploads/${m.filename}" class="bg-item ${idx === 0 ? 'active' : ''}">`;
                        else return `<video src="/uploads/${m.filename}" class="bg-item ${idx === 0 ? 'active' : ''}" autoplay muted loop playsinline></video>`;
                    }).join('');
                    let cur = 0; const items = document.querySelectorAll('.bg-item');
                    if (items.length > 1) setInterval(() => { items[cur].classList.remove('active'); cur = (cur + 1) % items.length; items[cur].classList.add('active'); }, 5000);
                }
            } catch (e) { console.error(e); }
        }
        async function login() {
            const id = document.getElementById('adminId').value;
            const pw = document.getElementById('adminPw').value;
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id, pw}) });
            if (res.ok) {
                const userData = await res.json();
                localStorage.setItem('user', JSON.stringify(userData));
                location.href = userData.isAdmin ? '/admin.html' : '/timetracker.html';
            } else alert('인증 실패');
        }
        window.onload = loadBackground;
    </script>
</body>
</html>
