<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | 법무법인 하이로</title>
    
    <!-- 파비콘 설정 -->
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    
    <!-- Google Fonts: Playfair Display (세리프), Inter (산세리프) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 공통 CSS 연결 -->
    <link rel="stylesheet" href="/css/main.css">

    <style>
        :root {
            --gold-primary: #c5a059;
            --bg-dark: #111111;
            --text-gray: #888888;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdfdfd; /* 밝고 깨끗한 배경 */
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* 우아한 배경 장식 요소 */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 90% 10%, rgba(197, 160, 89, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 10% 90%, rgba(197, 160, 89, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .login-card {
            background: #ffffff;
            padding: 60px 50px;
            border: 1px solid #eeeeee;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.05);
            text-align: center;
            position: relative;
        }

        /* 상단 골드 포인트 라인 */
        .login-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--gold-primary);
        }

        .login-logo {
            width: 100%; /* 박스 너비에 맞춰 최대화 */
            height: auto;
            margin-bottom: 40px;
            display: block;
            transition: transform 0.4s ease;
        }

        .login-logo:hover {
            transform: scale(1.02);
        }

        .login-header p {
            font-family: 'Playfair Display', serif;
            font-size: 11px;
            color: var(--gold-primary);
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 50px;
            opacity: 0.8;
        }

        .input-group {
            margin-bottom: 30px;
            text-align: left;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            transition: color 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1px solid #dddddd;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 400;
            outline: none;
            background: transparent;
            transition: all 0.3s ease;
            color: var(--bg-dark);
        }

        .input-group input:focus {
            border-bottom-color: var(--gold-primary);
        }

        .input-group input:focus + label {
            color: var(--gold-primary);
        }

        .login-btn {
            width: 100%;
            background: var(--bg-dark);
            color: #ffffff;
            border: 1px solid var(--bg-dark);
            padding: 18px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .login-btn:hover {
            background: var(--gold-primary);
            border-color: var(--gold-primary);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.2);
        }

        .footer-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .footer-links a {
            font-size: 11px;
            color: var(--text-gray);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
            font-weight: 500;
        }

        .footer-links a:hover {
            color: var(--gold-primary);
        }

        .divider {
            width: 1px;
            height: 10px;
            background: #eeeeee;
            align-self: center;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 반응형 모바일 대응 */
        @media (max-width: 480px) {
            .login-card { padding: 50px 30px; }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <!-- 로고 영역: 박스 너비에 맞춰 최대화 -->
            <img src="/logo.png" alt="High & Law" class="login-logo">
            
            <div class="login-header">
                <p>Internal Management System</p>
            </div>

            <div class="input-group">
                <label for="adminId">Identity ID</label>
                <input type="text" id="adminId" placeholder="아이디를 입력하십시오" spellcheck="false">
            </div>

            <div class="input-group">
                <label for="adminPw">Secure Password</label>
                <input type="password" id="adminPw" placeholder="비밀번호를 입력하십시오">
            </div>

            <button onclick="login()" class="login-btn">Secure Login</button>

            <div class="footer-links">
                <a href="/">Homepage</a>
                <div class="divider"></div>
                <a href="/signup.html">Register</a>
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const id = document.getElementById('adminId').value;
            const pw = document.getElementById('adminPw').value;

            if(!id || !pw) {
                alert('정보를 모두 입력해 주십시오.');
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, pw})
                });

                if (res.ok) {
                    const userData = await res.json();
                    
                    // 사용자 정보를 로컬 스토리지에 저장 (타임트래커 등에서 사용)
                    localStorage.setItem('user', JSON.stringify(userData));

                    // 권한에 따른 분기 처리
                    if (userData.isAdmin) {
                        location.href = '/admin.html';
                    } else {
                        location.href = '/timetracker.html';
                    }
                } else {
                    const msg = await res.text();
                    alert(msg || '인증 정보가 올바르지 않습니다.');
                }
            } catch (err) {
                alert('서버와 통신할 수 없습니다.');
            }
        }

        // 엔터키 지원
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
