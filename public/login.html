<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HighLaw | Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-lg shadow-2xl w-96">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-widest text-slate-800">HIGH & LAW</h1>
            <p class="text-sm text-amber-600 font-semibold">ADMIN PANEL</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="adminId" placeholder="아이디" class="w-full border-b-2 p-2 outline-none focus:border-amber-500">
            <input type="password" id="adminPw" placeholder="비밀번호" class="w-full border-b-2 p-2 outline-none focus:border-amber-500">
            <button onclick="login()" class="w-full bg-slate-800 text-white py-3 rounded hover:bg-slate-700 transition">로그인</button>
        </div>
    </div>

    <script>
        async function login() {
            const id = document.getElementById('adminId').value;
            const pw = document.getElementById('adminPw').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, pw})
            });
            if (res.ok) location.href = '/admin.html';
            else alert('로그인 정보가 올바르지 않습니다.');
        }
    </script>
</body>
</html>
