<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | 법무법인 하이로</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        body { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(to bottom right, #fdfdfd, #f4eee0); margin: 0; }
        .login-card { background: var(--white); width: 100%; max-width: 400px; padding: 60px 40px; border: 1px solid var(--border-color); box-shadow: 0 40px 80px rgba(0,0,0,0.06); text-align: center; }
        /* 로고 크기를 카테고리 박스 너비에 맞춰 최대화 */
        .login-logo { width: 100%; height: auto; margin-bottom: 30px; display: block; }
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid var(--border-color); font-size: 15px; outline: none; background: transparent; }
        .login-btn { width: 100%; background: #1a1a1a; color: var(--white); border: 1px solid var(--gold-primary); padding: 18px; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="/logo.png" alt="High & Law" class="login-logo">
        <p class="text-[11px] text-[#c5a059] font-bold tracking-widest uppercase mb-10">Admin Control Panel</p>
        <div class="input-group">
            <label>ID</label>
            <input type="text" id="adminId">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="adminPw">
        </div>
        <button onclick="login()" class="login-btn">Secure Login</button>
        <a href="/" style="display:block; margin-top:30px; font-size:11px; color:#bbb; text-decoration:none;">← Homepage</a>
    </div>
    <script>
        async function login() {
            const id = document.getElementById('adminId').value;
            const pw = document.getElementById('adminPw').value;
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id, pw}) });
            if (res.ok) {
                const userData = await res.json();
                localStorage.setItem('user', JSON.stringify(userData));
                location.href = userData.isAdmin ? '/admin.html' : '/timetracker.html';
            } else { alert('오류'); }
        }
    </script>
</body>
</html>
