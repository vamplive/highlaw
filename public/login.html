<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | 법무법인 하이로</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #111; }
        body { margin: 0; padding: 0; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; background: #000; overflow: hidden; }
        
        /* 배경 슬라이더 */
        .bg-slider { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; }
        .bg-item { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; opacity: 0; transition: opacity 2s; }
        .bg-item.active { opacity: 1; }
        .bg-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 2; }

        .login-card { 
            position: relative; z-index: 10; background: rgba(255,255,255,0.98); 
            width: 100%; max-width: 440px; padding: 60px 50px; text-align: center; 
            border-top: 4px solid var(--gold); box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .logo { width: 100%; height: auto; margin-bottom: 40px; }
        .form-group { margin-bottom: 25px; text-align: left; }
        .form-group label { display: block; font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #ddd; font-size: 16px; outline: none; background: transparent; }
        input:focus { border-bottom-color: var(--gold); }
        .login-btn { width: 100%; background: var(--dark); color: white; border: none; padding: 18px; font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .login-btn:hover { background: var(--gold); }
        .footer-links { margin-top: 30px; font-size: 11px; color: #aaa; text-transform: uppercase; }
        .footer-links a { color: #aaa; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="bg-slider" id="bg-slider"></div>
    <div class="bg-overlay"></div>

    <div class="login-card">
        <img src="/logo.png" alt="High & Law" class="logo">
        <div class="form-group">
            <label>Identity ID</label>
            <input type="text" id="adminId" placeholder="ID">
        </div>
        <div class="form-group">
            <label>Secure Password</label>
            <input type="password" id="adminPw" placeholder="Password">
        </div>
        <button onclick="login()" class="login-btn">Secure Login</button>
        <div class="footer-links">
            <a href="/">Home</a> | <a href="/signup.html">Register</a>
        </div>
    </div>

    <script>
        async function fetchBg() {
            try {
                const res = await fetch('/api/public/hero');
                const data = await res.json();
                const slider = document.getElementById('bg-slider');
                if (data.length > 0) {
                    slider.innerHTML = data.map((m, idx) => {
                        if (m.mimetype.startsWith('image')) return `<img src="/uploads/${m.filename}" class="bg-item ${idx === 0 ? 'active' : ''}">`;
                        else return `<video src="/uploads/${m.filename}" class="bg-item ${idx === 0 ? 'active' : ''}" autoplay muted loop></video>`;
                    }).join('');
                    let current = 0;
                    const items = document.querySelectorAll('.bg-item');
                    setInterval(() => {
                        items[current].classList.remove('active');
                        current = (current + 1) % items.length;
                        items[current].classList.add('active');
                    }, 6000);
                }
            } catch (e) {}
        }
        fetchBg();

        async function login() {
            const id = document.getElementById('adminId').value;
            const pw = document.getElementById('adminPw').value;
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id, pw}) });
            if (res.ok) {
                const userData = await res.json();
                localStorage.setItem('user', JSON.stringify(userData));
                location.href = userData.isAdmin ? '/admin.html' : '/timetracker.html';
            } else { alert('인증 실패'); }
        }
    </script>
</body>
</html>
