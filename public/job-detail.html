<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruit Detail | 법무법인 하이로</title>
    <link rel="stylesheet" href="/css/main.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .detail-container { max-width: 900px; margin: 0 auto; padding: 100px 20px; }
        .detail-header { border-bottom: 2px solid var(--gold-primary); padding-bottom: 30px; margin-bottom: 50px; }
        .detail-cat { font-size: 12px; color: var(--gold-primary); font-weight: 700; margin-bottom: 10px; display: block; }
        .detail-title { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--text-primary); }
        .detail-deadline { margin-top: 15px; font-size: 14px; font-weight: 700; color: #dc2626; }
        .detail-content { font-size: 16px; line-height: 1.8; margin-top: 40px; }
        .ql-editor { padding: 0 !important; }
        .attachments { margin-top: 60px; background: #f9f9f9; padding: 30px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-group"><img src="logo.png" alt="High & Law"></a>
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="recruit.html" style="color:var(--gold-primary)">Recruit</a></li>
            </ul>
        </nav>
    </header>

    <div class="detail-container">
        <div id="job-area">
            <p style="text-align:center; opacity:0.5;">공고를 불러오는 중입니다...</p>
        </div>
        <div style="text-align:center; margin-top:80px;">
            <a href="recruit.html" class="contact-link">목록으로 돌아가기</a>
        </div>
    </div>

    <script>
        async function fetchJob() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            try {
                const res = await fetch(`/api/public/jobs/${id}`);
                const data = await res.json();
                
                let fileHtml = '';
                if(data.attachments) {
                    data.attachments.forEach(f => {
                        fileHtml += `<div style="margin-top:10px;"><a href="/uploads/${f.filename}" download style="color:#666; font-size:14px;">📎 ${f.originalname} (다운로드)</a></div>`;
                    });
                }

                document.getElementById('job-area').innerHTML = `
                    <div class="detail-header">
                        <span class="detail-cat">${data.category}</span>
                        <h2 class="detail-title">${data.title}</h2>
                        <div class="detail-deadline">서류 접수 마감: ${data.deadline}</div>
                    </div>
                    <div class="detail-content ql-editor">${data.content}</div>
                    ${fileHtml ? `<div class="attachments"><strong>첨부 서류 및 관련 파일</strong>${fileHtml}</div>` : ''}
                `;
            } catch (e) { document.getElementById('job-area').innerHTML = "공고를 찾을 수 없습니다."; }
        }
        window.addEventListener('DOMContentLoaded', fetchJob);
    </script>
</body>
</html>
